apiVersion: v1
kind: Service
metadata:
  name: {{ include "dtq.fullname" . }}-redis
  labels:
    {{- include "dtq.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "dtq.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
