server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver so upstream hostnames are re-resolved
    # after container restarts, rather than cached at startup time.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # React SPA — all unknown paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Go API proxy
    location /api/v1/ {
        set $api_upstream http://api:8080;
        proxy_pass         $api_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # Health endpoint (Go)
    location /health {
        set $api_upstream http://api:8080;
        proxy_pass $api_upstream/health;
    }

    # AI service proxy — SSE requires disabled buffering
    location /api/ai/ {
        set $rag_upstream http://rag:8000;
        proxy_pass         $rag_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        '';
        proxy_http_version 1.1;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
